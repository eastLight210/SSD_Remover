name: SSD_Remover
options:
  bundleIdPrefix: com.donghyeok.kim
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.2"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  SSD_Remover:
    type: application
    platform: macOS
    sources:
      - path: SSD_Remover
        excludes:
          - "**/*.entitlements"
          - "**/Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.donghyeok.kim.SSD-Remover
        CODE_SIGN_ENTITLEMENTS: SSD_Remover/SSD_Remover.entitlements
        ENABLE_APP_SANDBOX: NO
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: SSD_Remover/Resources/Info.plist
      properties:
        CFBundleDisplayName: SSD Remover
        LSUIElement: true

  SSD_RemoverTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: SSD_RemoverTests
    dependencies:
      - target: SSD_Remover
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.donghyeok.kim.SSD-RemoverTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/SSD_Remover.app/Contents/MacOS/SSD_Remover"
        BUNDLE_LOADER: "$(TEST_HOST)"
